<footer class="bg-black text-white font-poppins py-10 border-t border-white/20">

  <div class="max-w-10/12 mx-auto">

    <div class="flex flex-wrap justify-between items-start gap-y-8 mb-8">
      <div class="flex flex-col gap-4">
        <div class="flex flex-wrap items-center gap-6">
          <a routerLink="/inicio" routerLinkActive="font-semibold"
             class="text-white hover:text-gray-400 transition-all text-sm">Inicio</a>
          <a routerLink="/proyecto" routerLinkActive="font-semibold"
             class="text-white hover:text-gray-400 transition-all text-sm">Proyecto</a>
          <a routerLink="/desarrolladores-web" routerLinkActive="font-semibold"
             class="text-white hover:text-gray-400 transition-all text-sm">Desarrolladores Web</a>
          <a routerLink="/contacto" routerLinkActive="font-semibold"
             class="text-white hover:text-gray-400 transition-all text-sm">Contacto</a>
        </div>

        <div class="flex items-center gap-4">
          @if(!authService.isLoggedIn()){
            <a routerLink="/registro"
               class="text-white hover:text-gray-400 transition-all text-sm">
              Regístrate
            </a>
            <a routerLink="/login" class="bg-white hover:bg-gray-200 transition-all text-black font-medium px-8 py-2 rounded-full">
              Inicia Sesión
            </a>
          } @else {
            <a (click)="authService.logout()"
               class="bg-white hover:bg-gray-200 transition-all text-black font-medium px-8 py-2 rounded-full">
              Logout
            </a>
          }
        </div>
      </div>

      <div class="flex flex-col items-start md:items-end gap-4">
        <a href="mailto:grup4upc@info.com"

        </a>

    <div class="flex flex-wrap justify-between items-center gap-y-2">
