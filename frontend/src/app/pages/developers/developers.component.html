<!-- Sección del título -->
<section class="titulo-seccion">
  <h1>EQUIPO DE DESARROLLADORES WEB</h1>
  <p>Conoce al equipo de desarrolladores web encargados de hacer la página.</p>
</section>

<!-- Carrusel de tarjetas -->
<section class="carrusel-seccion">

  <!-- Botón anterior -->
  <button class="btn-carrusel" (click)="anterior()"> &#8249; </button>

  <!-- Tarjetas de los developers -->
  <div class="tarjetas-contenedor">
    @for (dev of getDevsVisibles(); track dev.id) {
      <div class="tarjeta">

        <!-- Foto del developer -->
        <div class="tarjeta-imagen">
          <img [src]="dev.foto" [alt]="dev.nombre" />
        </div>

        <!-- Info del developer -->
        <div class="tarjeta-info">
          <h3>{{ dev.nombre }}</h3>
          <p>{{ dev.descripcion }}</p>

          <div class="flex items-center space-x-4">
        <a href="#" target="_blank" class="text-white border border-gray-600 rounded-full p-2.5 hover:bg-white hover:text-black transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <a href="#" target="_blank" class="text-white border border-gray-600 rounded-full p-2.5 hover:bg-white hover:text-black transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM0 8h5v16H0V8zm7.5 0H12v2.16h.07C12.67 9.04 14.1 8 16.25 8 21 8 22 11.08 22 15.16V24h-5v-7.87c0-1.88-.03-4.3-2.62-4.3-2.63 0-3.03 2.05-3.03 4.17V24H7.5V8z"/>
         </svg>
        </a>
      </div>
        </div>

      </div>
    }
  </div>

  <!-- Botón siguiente -->
  <button class="btn-carrusel" (click)="siguiente()"> &#8250; </button>

</section>

<!-- Indicadores (dots) del carrusel -->
<div class="dots">
  @for (dot of getDots(); track $index) {
    <span class="dot" [class.activo]="$index === indiceActual"></span>
  }
</div>

<!-- Sección de habilidades -->
<section class="habilidades-seccion">
  <div class="habilidades-grid">
    @for (hab of habilidades; track $index) {
      <div class="habilidad-card">
        <p>{{ hab }}</p>
      </div>
    }
  </div>
</section>
