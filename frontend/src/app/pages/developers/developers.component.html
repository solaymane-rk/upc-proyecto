<!-- Sección del título -->
<section class="titulo-seccion">
  <h1>EQUIPO DE DESARROLLADORES WEB</h1>
  <p>Conoce al equipo de desarrolladores web encargados de hacer la página.</p>
</section>

<!-- Carrusel de tarjetas -->
<section class="carrusel-seccion">

  <!-- Botón anterior -->
  <button class="btn-carrusel" (click)="anterior()"> &#8249; </button>

  <!-- Tarjetas de los developers -->
  <div class="tarjetas-contenedor">
    @for (dev of getDevsVisibles(); track dev.id) {
      <div class="tarjeta">

        <!-- Foto del developer -->
        <div class="tarjeta-imagen">
          <img [src]="dev.foto" [alt]="dev.nombre" />
        </div>

        <!-- Info del developer -->
        <div class="tarjeta-info">
          <h3>{{ dev.nombre }}</h3>
          <p>{{ dev.descripcion }}</p>

          <div class="tarjeta-botones">
            <a [href]="dev.github" target="_blank" class="btn-github" aria-label="GitHub">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
              </svg>
            </a>
            <a [href]="dev.linkedin" target="_blank" class="btn-github" aria-label="LinkedIn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM0 8h5v16H0V8zm7.5 0H12v2.16h.07C12.67 9.04 14.1 8 16.25 8 21 8 22 11.08 22 15.16V24h-5v-7.87c0-1.88-.03-4.3-2.62-4.3-2.63 0-3.03 2.05-3.03 4.17V24H7.5V8z"/>
              </svg>
            </a>
          </div>
        </div>

      </div>
    }
  </div>

  <!-- Botón siguiente -->
  <button class="btn-carrusel" (click)="siguiente()"> &#8250; </button>

</section>

<!-- Indicadores (dots) del carrusel -->
<div class="dots">
  @for (dot of getDots(); track $index) {
    <span class="dot" [class.activo]="$index === indiceActual"></span>
  }
</div>

<!-- Sección de habilidades -->
<section class="habilidades-seccion">
  <div class="habilidades-grid">
    @for (hab of habilidades; track $index) {
      <div class="habilidad-card">
        <p>{{ hab }}</p>
      </div>
    }
  </div>
</section>
